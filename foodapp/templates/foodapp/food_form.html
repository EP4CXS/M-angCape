{% extends 'base.html' %}

{% block title %}{{ action }} Food Item - NutriLife{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12 mb-4">
        <a href="{% url 'menu' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Menu
        </a>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">{{ action }} Food Item</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Name *</label>
                        <input type="text" name="name" class="form-control" 
                               value="{{ food_item.name|default:'' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ food_item.description|default:'' }}</textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Price *</label>
                            <input type="number" name="price" step="0.01" min="0" 
                                   class="form-control" value="{{ food_item.price|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category *</label>
                            <select name="category" class="form-select" required>
                                {% for value, label in categories %}
                                <option value="{{ value }}" {% if food_item.category == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Image</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        {% if food_item.image %}
                        <small class="text-muted">Current: {{ food_item.image.name }}</small>
                        {% endif %}
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_available" class="form-check-input" 
                               id="isAvailable" {% if food_item.is_available|default:true %}checked{% endif %}>
                        <label class="form-check-label" for="isAvailable">
                            Available for ordering
                        </label>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-2"></i>Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
